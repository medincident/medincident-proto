syntax = "proto3";

package medincident.events.v1;

// Cross-cutting transport envelope for medincident internal domain
// events. Every domain event published on the platform bus is wrapped
// in this Envelope; the concrete payload goes into the Any field and
// is routed by its type URL. Per-aggregate payloads live in their own
// bounded-context packages (e.g. medincident.orgstructure.v1).

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

// Envelope wraps a domain event payload with the metadata every
// consumer needs to route, deduplicate, and correlate it without
// having to unpack the payload first.
message Envelope {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;

  // Aggregate type the event belongs to, e.g. "organization", "user".
  // Consumers use this to pick a projection without unpacking payload.
  string aggregate_type = 3;
  string aggregate_id = 4;

  // Correlation id shared by all events caused by the same inbound
  // request, so event chains can be followed across services.
  string correlation_id = 5;

  google.protobuf.Any payload = 6;
}
