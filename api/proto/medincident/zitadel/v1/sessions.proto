syntax = "proto3";

package medincident.zitadel.v1;

// Session events sourced from Zitadel via the medincident-zitadel-actions
// webhook gateway. Same read-only-projection rationale as users.proto:
// Zitadel owns the session primitive; we publish an event stream so
// downstream services can stitch user activity without querying Zitadel
// directly on every request.

message SessionCreated {
  string fingerprint_id = 1;
  string ip_address = 2;
  string user_agent = 3;
}

message SessionUserChecked {
  string user_id = 1;
}
