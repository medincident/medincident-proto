syntax = "proto3";

package medincident.zitadel.v1;

option go_package = "github.com/medincident/medincident-zitadel-actions/pkg/medincident/zitadel/v1";

// Gender mirrors Zitadel's gender enum.
enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
  GENDER_DIVERSE = 3;
}
