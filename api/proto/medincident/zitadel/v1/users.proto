syntax = "proto3";

package medincident.zitadel.v1;

// User identity events sourced from Zitadel via the medincident-zitadel-actions
// webhook gateway. This package is a read-only projection of Zitadel's own
// user lifecycle — the platform does not own the user record itself, only
// a minimal event trail for downstream consumers (audit log, session
// stitching, query projections).

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
  GENDER_DIVERSE = 3;
}

message UserCreated {
  string username = 1;
  string first_name = 2;
  string last_name = 3;
  string display_name = 4;
  string nick_name = 5;
  Gender gender = 6;
  string email = 7;
  string preferred_language = 8;
}

// UserNameChanged carries only the fields that changed. An absent
// optional means "no change to this field in this event".
message UserNameChanged {
  optional string first_name = 1;
  optional string last_name = 2;
  optional string display_name = 3;
  optional string nick_name = 4;
}

message UserGenderChanged {
  Gender gender = 1;
}

message UserEmailChanged {
  string email = 1;
}

message UserEmailVerified {}

message UserLanguageChanged {
  string preferred_language = 1;
}
