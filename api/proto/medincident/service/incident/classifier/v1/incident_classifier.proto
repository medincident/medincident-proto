syntax = "proto3";

package medincident.service.incident.classifier.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";

// IncidentClassifierService is the command-side contract for a single
// administrative surface that manages an organisation's incident
// classifier: a tree of incident categories (max depth 5) with incident
// types living inside any category. Every mutation returns an id (for
// Create) or an empty response and publishes one domain event per
// touched row.
service IncidentClassifierService {
  // --- Categories ---
  rpc CreateIncidentCategory(CreateIncidentCategoryRequest) returns (CreateIncidentCategoryResponse) {
    option (google.api.http) = {
      post: "/v1/organizations/{organization_id}/incident-categories"
      body: "*"
    };
  }
  rpc UpdateIncidentCategoryDetails(UpdateIncidentCategoryDetailsRequest) returns (UpdateIncidentCategoryDetailsResponse) {
    option (google.api.http) = {
      patch: "/v1/incident-categories/{category_id}/details"
      body: "*"
    };
  }
  rpc MoveIncidentCategory(MoveIncidentCategoryRequest) returns (MoveIncidentCategoryResponse) {
    option (google.api.http) = {
      patch: "/v1/incident-categories/{category_id}/parent"
      body: "*"
    };
  }
  rpc DeactivateIncidentCategory(DeactivateIncidentCategoryRequest) returns (DeactivateIncidentCategoryResponse) {
    option (google.api.http) = {post: "/v1/incident-categories/{category_id}/deactivations"};
  }
  rpc ReactivateIncidentCategory(ReactivateIncidentCategoryRequest) returns (ReactivateIncidentCategoryResponse) {
    option (google.api.http) = {post: "/v1/incident-categories/{category_id}/reactivations"};
  }
  rpc DeleteIncidentCategory(DeleteIncidentCategoryRequest) returns (DeleteIncidentCategoryResponse) {
    option (google.api.http) = {delete: "/v1/incident-categories/{category_id}"};
  }

  // --- Types ---
  rpc CreateIncidentType(CreateIncidentTypeRequest) returns (CreateIncidentTypeResponse) {
    option (google.api.http) = {
      post: "/v1/incident-categories/{category_id}/types"
      body: "*"
    };
  }
  rpc UpdateIncidentTypeDetails(UpdateIncidentTypeDetailsRequest) returns (UpdateIncidentTypeDetailsResponse) {
    option (google.api.http) = {
      patch: "/v1/incident-types/{type_id}/details"
      body: "*"
    };
  }
  rpc MoveIncidentType(MoveIncidentTypeRequest) returns (MoveIncidentTypeResponse) {
    option (google.api.http) = {
      patch: "/v1/incident-types/{type_id}/category"
      body: "*"
    };
  }
  rpc DeactivateIncidentType(DeactivateIncidentTypeRequest) returns (DeactivateIncidentTypeResponse) {
    option (google.api.http) = {post: "/v1/incident-types/{type_id}/deactivations"};
  }
  rpc ReactivateIncidentType(ReactivateIncidentTypeRequest) returns (ReactivateIncidentTypeResponse) {
    option (google.api.http) = {post: "/v1/incident-types/{type_id}/reactivations"};
  }
  rpc DeleteIncidentType(DeleteIncidentTypeRequest) returns (DeleteIncidentTypeResponse) {
    option (google.api.http) = {delete: "/v1/incident-types/{type_id}"};
  }
}

// ---- Category messages ----

message CreateIncidentCategoryRequest {
  string organization_id = 1 [(google.api.field_behavior) = REQUIRED];
  optional string parent_category_id = 2;
  string name = 3 [(google.api.field_behavior) = REQUIRED];
  optional string description = 4;
}
message CreateIncidentCategoryResponse {
  string category_id = 1;
}

message UpdateIncidentCategoryDetailsRequest {
  string category_id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  optional string description = 3;
}
message UpdateIncidentCategoryDetailsResponse {}

message MoveIncidentCategoryRequest {
  string category_id = 1 [(google.api.field_behavior) = REQUIRED];
  optional string new_parent_category_id = 2;
}
message MoveIncidentCategoryResponse {}

message DeactivateIncidentCategoryRequest {
  string category_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message DeactivateIncidentCategoryResponse {}

message ReactivateIncidentCategoryRequest {
  string category_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message ReactivateIncidentCategoryResponse {}

message DeleteIncidentCategoryRequest {
  string category_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message DeleteIncidentCategoryResponse {}

// ---- Type messages ----

message CreateIncidentTypeRequest {
  string category_id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  optional string description = 3;
}
message CreateIncidentTypeResponse {
  string type_id = 1;
}

message UpdateIncidentTypeDetailsRequest {
  string type_id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  optional string description = 3;
}
message UpdateIncidentTypeDetailsResponse {}

message MoveIncidentTypeRequest {
  string type_id = 1 [(google.api.field_behavior) = REQUIRED];
  string new_category_id = 2 [(google.api.field_behavior) = REQUIRED];
}
message MoveIncidentTypeResponse {}

message DeactivateIncidentTypeRequest {
  string type_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message DeactivateIncidentTypeResponse {}

message ReactivateIncidentTypeRequest {
  string type_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message ReactivateIncidentTypeResponse {}

message DeleteIncidentTypeRequest {
  string type_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message DeleteIncidentTypeResponse {}
