syntax = "proto3";

package medincident.orgstructure.v1;

import "medincident/shared/geo/v1/types.proto";

// Events for the orgstructure bounded context. A single BC-level
// package holds payloads for every aggregate this service owns:
// Organization, Clinic (future), Department (future), Employee (future).
// One sensible namespace per service, not per aggregate — the BC is
// the deploy/versioning unit.
//
// All events carry NEW state only. Consumers that need a diff compute
// it against their own previous projection. Envelope-level metadata
// (event_id, aggregate_type, aggregate_id, occurred_at, correlation_id)
// lives in medincident.events.v1.Envelope and is populated by the
// publisher from outbox row columns, not from these payloads. Consumers
// filter by envelope.aggregate_type ("organization", "clinic", ...) to
// route each payload to the right projection.

// OrganizationCreated — an Organization was created with this state.
message OrganizationCreated {
  string name = 1;
  optional string description = 2;
  optional medincident.shared.geo.v1.Address legal_address = 3;
}

// OrganizationRenamed — the organization's display name became this.
message OrganizationRenamed {
  string name = 1;
}

// OrganizationDescriptionUpdated — the organization's description became
// this. An unset field (proto3 zero / absent optional) means "cleared".
message OrganizationDescriptionUpdated {
  optional string description = 1;
}

// OrganizationLegalAddressRelocated — the organization's legal address
// became this. An absent field means "cleared".
message OrganizationLegalAddressRelocated {
  optional medincident.shared.geo.v1.Address legal_address = 1;
}
