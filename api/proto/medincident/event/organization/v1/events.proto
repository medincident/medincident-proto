syntax = "proto3";

package medincident.event.organization.v1;

// Events for the Organization aggregate. Self-contained: declares its
// own Address and Point types; no cross-package imports so this file
// can evolve independently of Clinic and Department event schemas.
//
// Events carry NEW state only. Consumers compute diffs from their own
// previous projection.

message Point {
  double longitude = 1;
  double latitude = 2;
}

message Address {
  string text = 1;
  optional Point point = 2;
}

// OrganizationCreated — the aggregate entered this state on creation.
message OrganizationCreated {
  string name = 1;
  optional string description = 2;
  Address legal_address = 3;
}

// OrganizationDetailsChanged — name and description became these.
message OrganizationDetailsChanged {
  string name = 1;
  optional string description = 2;
}

// OrganizationLegalAddressChanged — legal address became this.
message OrganizationLegalAddressChanged {
  Address legal_address = 1;
}
