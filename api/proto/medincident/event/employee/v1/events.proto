syntax = "proto3";

package medincident.event.employee.v1;

import "google/protobuf/timestamp.proto";

// Events for the Employee "aggregate" (Employee + Vacation sub-entity).
// Self-contained: no cross-package imports. Events carry NEW state
// only. Consumers compute diffs against their own previous projection.
//
// Vacation events live in this same package because Vacation has no
// independent lifecycle — it is always a child of an Employee. The
// envelope's aggregate_id for vacation events is the employee_id;
// the vacation_id is carried in the payload.

// ------ Employee events ------

message EmployeeHired {
  string zitadel_user_id = 1;
  string organization_id = 2;
  string department_id = 3;
  optional string position = 4;
}

message EmployeePositionChanged {
  optional string position = 1;
}

message EmployeeDepartmentChanged {
  string department_id = 1;
}

message EmployeeTerminated {}

// ------ Vacation events (envelope.aggregate_id == employee_id) ------

message VacationStarted {
  string vacation_id = 1;
  google.protobuf.Timestamp starts_at = 2;
  optional google.protobuf.Timestamp ends_at = 3;
}

message VacationScheduled {
  string vacation_id = 1;
  google.protobuf.Timestamp starts_at = 2;
  optional google.protobuf.Timestamp ends_at = 3;
}

message VacationEndDateChanged {
  string vacation_id = 1;
  google.protobuf.Timestamp ends_at = 2;
}

message VacationEnded {
  string vacation_id = 1;
  google.protobuf.Timestamp ends_at = 2;
}

message VacationCancelled {
  string vacation_id = 1;
}
