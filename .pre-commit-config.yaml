repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: task-fmt-check
        name: format check
        entry: task
        args: [fmt:check]
        language: system
        files: '\.proto$'
        pass_filenames: false

      - id: task-lint
        name: lint (style)
        entry: task
        args: [lint]
        language: system
        files: '\.proto$'
        pass_filenames: false

      - id: task-breaking
        name: breaking-change check
        entry: task
        args: [breaking]
        language: system
        files: '\.proto$'
        pass_filenames: false

      - id: task-gen-check
        name: generated artifacts check
        entry: task
        args: [gen:check]
        language: system
        files: '\.proto$'
        pass_filenames: false
