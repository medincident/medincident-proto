version: "3"

tasks:
  fmt:
    desc: Format protobuf definitions
    cmds:
      - go tool buf format -w

  fmt:check:
    desc: Check protobuf formatting (dry-run, no files modified)
    cmds:
      - go tool buf format --diff --exit-code

  lint:
    desc: Lint protobuf definitions
    cmds:
      - go tool buf lint
